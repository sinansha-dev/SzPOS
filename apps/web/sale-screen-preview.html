<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SzPOS Preview</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div class="sale-screen">
    <header class="topbar">
      <div>
        <h1>SzPOS • Smart Checkout</h1>
        <p class="hint">Enter = quick add • F1 Cash • F2 UPI • F3 Card</p>
      </div>
      <div class="toolbar">
        <span class="badge online">Online</span>
        <button class="secondary">Sync</button>
        <button class="primary">Print Receipt</button>
      </div>
    </header>
    <div class="layout">
      <section class="panel left">
        <input class="search" placeholder="Search barcode / name" />
        <div class="chips"><button class="chip active">All</button><button class="chip">Bakery</button><button class="chip">Beverage</button></div>
        <div class="quick-grid">
          <button class="quick-btn"><strong>Chocolate Cake</strong><span>Bakery</span><b>₹120</b></button>
          <button class="quick-btn"><strong>Donut</strong><span>Bakery</span><b>₹40</b></button>
          <button class="quick-btn"><strong>Cold Coffee</strong><span>Beverage</span><b>₹90</b></button>
          <button class="quick-btn"><strong>Brownie</strong><span>Dessert</span><b>₹60</b></button>
        </div>
      </section>
      <section class="panel middle">
        <h2>Cart Lines</h2>
        <div class="line-item"><div><strong>Chocolate Cake (Slice)</strong><small>₹120.00 each</small></div><div class="qty-controls"><button>-</button><span>1</span><button>+</button></div></div>
        <div class="line-item"><div><strong>Donut</strong><small>₹40.00 each</small></div><div class="qty-controls"><button>-</button><span>2</span><button>+</button></div></div>
      </section>
      <section class="panel right">
        <h2>Checkout</h2>
        <p>Subtotal: ₹200.00</p>
        <p>GST: ₹10.00</p>
        <label class="discount">Discount (₹)<input type="number" value="0" /></label>
        <p class="total">Total: ₹210.00</p>
        <div class="pay-grid"><button class="cash">Cash (F1)</button><button class="upi">UPI (F2)</button><button class="card">Card (F3)</button></div>
        <button class="print">Print Receipt</button>
        <button class="kitchen">Print Kitchen Ticket</button>
        <p class="status">Ready</p>
      </section>
    </div>
  </div>
</body>
</html>
